<!doctype html>
<html lang="en">
  <head>
    <meta charset="utf-8" />
    <title>Convergence clean fixture</title>
    <style>
      :root {
        --color-fg: #111418;
        --color-bg: #ffffff;
        --color-accent: #2b6cb0;
        --color-hover-bg: #f2f5f8;
        --radius-sm: 4px;
        --radius-md: 8px;
        --space-2: 8px;
        --space-3: 12px;
        --shadow-sm: 0 1px 2px rgba(17, 20, 24, 0.12);
        --shadow-md: 0 4px 8px rgba(17, 20, 24, 0.16);
        --shadow-lg: 0 12px 24px rgba(17, 20, 24, 0.2);
      }
      body {
        color: var(--color-fg);
        background: var(--color-bg);
        -webkit-font-smoothing: antialiased;
      }
      h1 {
        text-wrap: balance;
      }
      .button {
        color: var(--color-fg);
        background: var(--color-bg);
        border-radius: var(--radius-md);
        padding: var(--space-2) var(--space-3);
        transition: transform 0.15s ease-out, box-shadow 0.15s ease-out, opacity 0.15s ease-out;
        box-shadow: var(--shadow-sm);
        animation-delay: calc(30ms * var(--index, 0));
      }
      .button:hover { background: var(--color-hover-bg); box-shadow: var(--shadow-md); }
      .button:focus-visible { outline: 2px solid var(--color-accent); outline-offset: 2px; }
      .button:active { transform: scale(0.96); }
      .button:disabled { opacity: 0.5; }
      .button:default { box-shadow: var(--shadow-sm); }
      .button:loading { opacity: 0; }
      .button:error { outline-color: var(--color-accent); }
      .button:success { outline-color: var(--color-accent); }
      .icon { transition: opacity 0.15s ease-out, transform 0.15s ease-out, filter 0.15s ease-out; }
      @keyframes button-exit {
        to { opacity: 0; transform: scale(0.96); }
      }
      @media (prefers-reduced-motion: reduce) {
        .button { transition: none; animation: none; }
      }
    </style>
  </head>
  <body>
    <main>
      <h1>Welcome</h1>
      <button type="button" class="button" aria-label="Continue">Continue</button>
    </main>
  </body>
</html>
