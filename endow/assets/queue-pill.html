<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Queue Pill Prototype</title>
<style>
  @font-face { font-family: 'EndowSans'; font-weight: 400; src: url('../fonts/endowsans-400.woff2') format('woff2'); }
  @font-face { font-family: 'EndowSans'; font-weight: 700; src: url('../fonts/endowsans-700.woff2') format('woff2'); }

  * { margin: 0; padding: 0; box-sizing: border-box; }
  body {
    background: #1a1a1a;
    font-family: 'EndowSans', system-ui, sans-serif;
    display: flex;
    flex-direction: column;
    align-items: center;
    justify-content: center;
    min-height: 100vh;
    gap: 40px;
  }

  .scene-label {
    font-size: 10px;
    font-weight: 500;
    letter-spacing: 0.06em;
    text-transform: uppercase;
    color: rgba(255,255,255,0.2);
  }

  /* === PILL === */
  .q-pill {
    display: flex;
    align-items: center;
    gap: 10px;
    height: 44px;
    background: #1a1a1a;
    border: 1px solid rgba(255,255,255,0.1);
    border-radius: 22px;
    padding: 6px 18px 6px 6px;
    cursor: pointer;
    user-select: none;
    box-shadow: 0 2px 12px rgba(0,0,0,0.4);
    transition: padding 0.35s cubic-bezier(0.4,0,0.2,1), gap 0.35s cubic-bezier(0.4,0,0.2,1);
    position: relative;
    overflow: visible;
  }

  .q-pill:active .q-pill__count {
    transform: scale(0.92);
  }

  .q-pill__count {
    width: 32px;
    height: 32px;
    border-radius: 50%;
    background: rgba(255,255,255,0.08);
    display: flex;
    align-items: center;
    justify-content: center;
    flex-shrink: 0;
    font-size: 13px;
    font-weight: 700;
    color: #D97757;
    transition: background 0.15s, transform 0.1s;
  }

  .q-pill:hover .q-pill__count {
    background: rgba(217,119,87,0.12);
  }

  .q-pill.is-active .q-pill__count {
    background: #D97757;
    color: #fff;
  }

  .q-pill__label {
    font-family: 'EndowSans', system-ui, sans-serif;
    font-size: 14px;
    font-weight: 500;
    color: rgba(255,255,255,0.85);
    white-space: nowrap;
    overflow: hidden;
    transition: width 0.35s cubic-bezier(0.4,0,0.2,1), opacity 0.25s ease;
  }

  .q-pill__hint {
    position: absolute;
    bottom: 100%;
    left: 50%;
    transform: translateX(-50%) translateY(4px);
    background: #1a1a1a;
    border: 1px solid rgba(255,255,255,0.1);
    border-radius: 20px;
    padding: 5px 14px;
    font-size: 11px;
    font-family: 'EndowSans', system-ui, sans-serif;
    font-weight: 500;
    color: rgba(255,255,255,0.85);
    white-space: nowrap;
    pointer-events: none;
    opacity: 0;
    transition: opacity 120ms ease, transform 120ms ease;
    box-shadow: 0 2px 8px rgba(0,0,0,0.3);
    z-index: 10;
    margin-bottom: 6px;
  }

  .q-pill.is-collapsed:hover .q-pill__hint {
    opacity: 1;
    transform: translateX(-50%) translateY(0);
  }

  /* === QUEUE PANEL === */
  .q-panel {
    width: 320px;
    background: #1a1a1a;
    border: 1px solid rgba(255,255,255,0.1);
    border-radius: 16px;
    box-shadow: 0 4px 24px rgba(0,0,0,0.5);
    overflow: hidden;
    position: fixed;
    opacity: 0;
    transform: translateY(12px);
    pointer-events: none;
    transition: opacity 0.25s ease, transform 0.25s cubic-bezier(0.4,0,0.2,1);
    z-index: 9;
  }

  .q-panel.is-open {
    opacity: 1;
    transform: translateY(0);
    pointer-events: all;
  }

  .q-panel__header {
    padding: 14px 16px 10px;
    font-size: 12px;
    font-weight: 500;
    color: rgba(255,255,255,0.4);
    letter-spacing: 0.03em;
    text-transform: uppercase;
    border-bottom: 1px solid rgba(255,255,255,0.06);
  }

  .q-panel__list {
    padding: 8px 12px;
    max-height: 240px;
    overflow-y: auto;
  }

  .q-panel__item {
    padding: 10px 12px;
    border-radius: 10px;
    margin-bottom: 6px;
    background: rgba(255,255,255,0.02);
    transition: background 80ms ease;
    cursor: pointer;
  }

  .q-panel__item:hover {
    background: rgba(255,255,255,0.06);
  }

  .q-panel__item-row {
    display: flex;
    align-items: flex-start;
    gap: 8px;
  }

  .q-panel__item-num {
    width: 20px;
    height: 20px;
    border-radius: 50%;
    background: #D97757;
    display: flex;
    align-items: center;
    justify-content: center;
    flex-shrink: 0;
  }

  .q-panel__item-num span {
    font-size: 10px;
    font-weight: 700;
    color: #1a1a1a;
    font-variant-numeric: tabular-nums;
  }

  .q-panel__item-body {
    flex: 1;
    min-width: 0;
  }

  .q-panel__item-summary {
    font-size: 12px;
    color: rgba(255,255,255,0.85);
    line-height: 1.4;
  }

  .q-panel__item-target {
    font-size: 10px;
    color: rgba(255,255,255,0.35);
    margin-top: 3px;
    font-family: 'EndowSans', system-ui, sans-serif;
  }

  .q-panel__item-actions {
    display: flex;
    gap: 4px;
    flex-shrink: 0;
    opacity: 0;
    transition: opacity 100ms ease;
  }

  .q-panel__item:hover .q-panel__item-actions {
    opacity: 1;
  }

  .q-panel__item-action {
    width: 24px;
    height: 24px;
    border: none;
    background: transparent;
    color: rgba(255,255,255,0.4);
    border-radius: 6px;
    cursor: pointer;
    display: flex;
    align-items: center;
    justify-content: center;
    transition: background 100ms ease, color 100ms ease;
    padding: 0;
  }

  .q-panel__item-action:hover {
    background: rgba(255,255,255,0.08);
    color: rgba(255,255,255,0.85);
  }

  .q-panel__item-action--delete:hover {
    background: rgba(239,68,68,0.15);
    color: #ef4444;
  }

  .q-panel__actions {
    padding: 12px 16px;
    border-top: 1px solid rgba(255,255,255,0.06);
    display: flex;
    gap: 8px;
  }

  .q-panel__btn {
    flex: 1;
    height: 36px;
    border-radius: 8px;
    border: 1px solid rgba(255,255,255,0.12);
    background: rgba(255,255,255,0.04);
    color: rgba(255,255,255,0.65);
    font-family: 'EndowSans', system-ui, sans-serif;
    font-size: 12px;
    font-weight: 500;
    cursor: pointer;
    transition: background 0.15s, color 0.15s, border-color 0.15s;
  }

  .q-panel__btn:hover {
    background: rgba(255,255,255,0.08);
    color: rgba(255,255,255,0.85);
    border-color: rgba(255,255,255,0.18);
  }

  .q-panel__btn:active {
    transform: scale(0.97);
  }

  .q-panel__btn--primary {
    background: rgba(217,119,87,0.1);
    border-color: rgba(217,119,87,0.25);
    color: #D97757;
  }

  .q-panel__btn--primary:hover {
    background: rgba(217,119,87,0.18);
    color: #e8906e;
    border-color: rgba(217,119,87,0.35);
  }

  /* === CONTROLS === */
  .controls {
    display: flex;
    gap: 12px;
    margin-top: 16px;
  }

  .controls button {
    background: none;
    border: 1px solid rgba(255,255,255,0.1);
    color: rgba(255,255,255,0.4);
    font-family: 'EndowSans', system-ui, sans-serif;
    font-size: 11px;
    font-weight: 500;
    padding: 6px 16px;
    border-radius: 8px;
    cursor: pointer;
    transition: border-color 0.15s, color 0.15s;
  }

  .controls button:hover {
    border-color: rgba(255,255,255,0.2);
    color: rgba(255,255,255,0.7);
  }
</style>
</head>
<body>

<div class="q-pill" id="pill">
  <div class="q-pill__count" id="count">3</div>
  <span class="q-pill__label" id="label">Queued Changes</span>
  <div class="q-pill__hint">Queued Changes</div>
</div>

<div class="q-panel" id="panel">
  <div class="q-panel__header">Queued Changes (<span id="panel-count">3</span>)</div>
  <div class="q-panel__list" id="queue-list"></div>
  <div class="q-panel__actions">
    <button class="q-panel__btn" id="btn-clear">Clear All</button>
    <button class="q-panel__btn q-panel__btn--primary" id="btn-send">Send All</button>
  </div>
</div>

<div class="controls">
  <button id="add-item">+ Add Queued Item</button>
  <button id="reset">Reset</button>
</div>

<span class="scene-label" id="state-label">AT REST</span>

<script>
var pill = document.getElementById('pill');
var label = document.getElementById('label');
var countEl = document.getElementById('count');
var panel = document.getElementById('panel');
var panelCount = document.getElementById('panel-count');
var queueList = document.getElementById('queue-list');
var stateLabel = document.getElementById('state-label');

var isOpen = false;
var isCollapsed = false;
var queueCount = 3;

var sampleItems = [
  { prompt: 'Make heading larger', target: '.hero h1' },
  { prompt: 'Change button color to red', target: '.cta-button' },
  { prompt: 'Add padding to card', target: '.card-wrapper' },
  { prompt: 'Increase font size on subtitle', target: '.hero p' },
  { prompt: 'Remove border from hero image', target: '.interior-hero__card-image' },
  { prompt: 'Center the logo vertically', target: '.site-header .logo' },
  { prompt: 'Add drop shadow to card', target: '.card' },
  { prompt: 'Make CTA button wider', target: '.btn-primary' },
  { prompt: 'Reduce margin between sections', target: 'section + section' }
];

function buildItem(prompt, target, num) {
  var item = document.createElement('div');
  item.className = 'q-panel__item';

  var row = document.createElement('div');
  row.className = 'q-panel__item-row';

  var numCircle = document.createElement('div');
  numCircle.className = 'q-panel__item-num';
  var numSpan = document.createElement('span');
  numSpan.textContent = String(num);
  numCircle.appendChild(numSpan);
  row.appendChild(numCircle);

  var body = document.createElement('div');
  body.className = 'q-panel__item-body';

  var summary = document.createElement('div');
  summary.className = 'q-panel__item-summary';
  summary.textContent = prompt;
  body.appendChild(summary);

  if (target) {
    var tgt = document.createElement('div');
    tgt.className = 'q-panel__item-target';
    tgt.textContent = target;
    body.appendChild(tgt);
  }

  row.appendChild(body);

  var actions = document.createElement('div');
  actions.className = 'q-panel__item-actions';

  // Edit (pencil) - Lucide pencil icon paths verbatim
  var editBtn = document.createElement('button');
  editBtn.className = 'q-panel__item-action';
  editBtn.title = 'Edit';
  var editSvg = document.createElementNS('http://www.w3.org/2000/svg', 'svg');
  editSvg.setAttribute('width', '14');
  editSvg.setAttribute('height', '14');
  editSvg.setAttribute('viewBox', '0 0 24 24');
  editSvg.setAttribute('fill', 'none');
  editSvg.setAttribute('stroke', 'currentColor');
  editSvg.setAttribute('stroke-width', '2');
  editSvg.setAttribute('stroke-linecap', 'round');
  editSvg.setAttribute('stroke-linejoin', 'round');
  var ep1 = document.createElementNS('http://www.w3.org/2000/svg', 'path');
  ep1.setAttribute('d', 'M21.174 6.812a1 1 0 0 0-3.986-3.987L3.842 16.174a2 2 0 0 0-.5.83l-1.321 4.352a.5.5 0 0 0 .623.622l4.353-1.32a2 2 0 0 0 .83-.497z');
  editSvg.appendChild(ep1);
  editBtn.appendChild(editSvg);
  actions.appendChild(editBtn);

  // Delete (trash) - Lucide trash-2 icon paths verbatim
  var delBtn = document.createElement('button');
  delBtn.className = 'q-panel__item-action q-panel__item-action--delete';
  delBtn.title = 'Remove';
  var delSvg = document.createElementNS('http://www.w3.org/2000/svg', 'svg');
  delSvg.setAttribute('width', '14');
  delSvg.setAttribute('height', '14');
  delSvg.setAttribute('viewBox', '0 0 24 24');
  delSvg.setAttribute('fill', 'none');
  delSvg.setAttribute('stroke', 'currentColor');
  delSvg.setAttribute('stroke-width', '2');
  delSvg.setAttribute('stroke-linecap', 'round');
  delSvg.setAttribute('stroke-linejoin', 'round');
  var dp1 = document.createElementNS('http://www.w3.org/2000/svg', 'path');
  dp1.setAttribute('d', 'M3 6h18');
  delSvg.appendChild(dp1);
  var dp2 = document.createElementNS('http://www.w3.org/2000/svg', 'path');
  dp2.setAttribute('d', 'M19 6v14c0 1-1 2-2 2H7c-1 0-2-1-2-2V6');
  delSvg.appendChild(dp2);
  var dp3 = document.createElementNS('http://www.w3.org/2000/svg', 'path');
  dp3.setAttribute('d', 'M8 6V4c0-1 1-2 2-2h4c1 0 2 1 2 2v2');
  delSvg.appendChild(dp3);
  var dp4 = document.createElementNS('http://www.w3.org/2000/svg', 'line');
  dp4.setAttribute('x1', '10');
  dp4.setAttribute('y1', '11');
  dp4.setAttribute('x2', '10');
  dp4.setAttribute('y2', '17');
  delSvg.appendChild(dp4);
  var dp5 = document.createElementNS('http://www.w3.org/2000/svg', 'line');
  dp5.setAttribute('x1', '14');
  dp5.setAttribute('y1', '11');
  dp5.setAttribute('x2', '14');
  dp5.setAttribute('y2', '17');
  delSvg.appendChild(dp5);
  delBtn.appendChild(delSvg);
  actions.appendChild(delBtn);

  row.appendChild(actions);
  item.appendChild(row);
  return item;
}

function rebuildList() {
  queueList.textContent = '';
  for (var i = 0; i < queueCount; i++) {
    var si = sampleItems[i % sampleItems.length];
    queueList.appendChild(buildItem(si.prompt, si.target, i + 1));
  }
}

rebuildList();

function updateCount() {
  countEl.textContent = queueCount;
  panelCount.textContent = queueCount;
}

function positionPanel() {
  var rect = pill.getBoundingClientRect();
  var panelW = 320;
  var left = rect.left + rect.width / 2 - panelW / 2;
  if (left < 8) left = 8;
  if (left + panelW > window.innerWidth - 8) left = window.innerWidth - panelW - 8;
  panel.style.left = left + 'px';
  panel.style.bottom = (window.innerHeight - rect.top + 10) + 'px';
}

pill.addEventListener('click', function() {
  if (!isCollapsed) {
    isCollapsed = true;
    isOpen = true;
    pill.classList.add('is-active', 'is-collapsed');

    // Capture current width, set it explicitly, then animate to 0
    var labelW = label.offsetWidth;
    label.style.width = labelW + 'px';
    label.offsetHeight; // force reflow
    label.style.width = '0';
    label.style.opacity = '0';
    pill.style.gap = '0';
    pill.style.padding = '6px';

    positionPanel();
    panel.classList.add('is-open');
    stateLabel.textContent = 'PANEL OPEN';
  } else {
    isOpen = !isOpen;
    pill.classList.toggle('is-active', isOpen);
    if (isOpen) positionPanel();
    panel.classList.toggle('is-open', isOpen);
    stateLabel.textContent = isOpen ? 'PANEL OPEN' : 'PANEL CLOSED (ICON ONLY)';
  }
});

document.getElementById('btn-send').addEventListener('click', function() {
  stateLabel.textContent = 'SENT ' + queueCount + ' CHANGES';
  queueCount = 0;
  updateCount();
  panel.classList.remove('is-open');
  pill.classList.remove('is-active');
  isOpen = false;

  // Fade out pill
  pill.animate([
    { opacity: 1, transform: 'scale(1)' },
    { opacity: 0, transform: 'scale(0.9)' }
  ], { duration: 250, easing: 'ease', fill: 'forwards' });
});

document.getElementById('btn-clear').addEventListener('click', function() {
  stateLabel.textContent = 'CLEARED ALL';
  queueCount = 0;
  updateCount();
  queueList.textContent = '';
  panel.classList.remove('is-open');
  pill.classList.remove('is-active');
  isOpen = false;

  pill.animate([
    { opacity: 1, transform: 'scale(1)' },
    { opacity: 0, transform: 'scale(0.9)' }
  ], { duration: 250, easing: 'ease', fill: 'forwards' });
});

document.getElementById('add-item').addEventListener('click', function() {
  queueCount++;
  updateCount();

  countEl.animate([
    { transform: 'scale(1)' },
    { transform: 'scale(1.125)' },
    { transform: 'scale(1)' }
  ], { duration: 250, easing: 'cubic-bezier(0.34, 1.56, 0.64, 1)' });

  var si = sampleItems[(queueCount - 1) % sampleItems.length];
  queueList.appendChild(buildItem(si.prompt, si.target, queueCount));

  // If pill was hidden, show it again
  if (queueCount === 1) {
    isCollapsed = false;
    isOpen = false;
    pill.classList.remove('is-active', 'is-collapsed');
    pill.style.gap = '10px';
    pill.style.padding = '6px 18px 6px 6px';
    label.style.width = '';
    label.style.opacity = '1';
    pill.style.opacity = '1';
    pill.style.transform = '';
    pill.getAnimations().forEach(function(a) { a.cancel(); });
    stateLabel.textContent = 'AT REST';
  }
});

document.getElementById('reset').addEventListener('click', function() {
  queueCount = 3;
  updateCount();
  isCollapsed = false;
  isOpen = false;
  pill.classList.remove('is-active', 'is-collapsed');
  pill.style.gap = '10px';
  pill.style.padding = '6px 18px 6px 6px';
  label.style.width = '';
  label.style.opacity = '1';
  pill.style.opacity = '1';
  pill.style.transform = '';
  pill.getAnimations().forEach(function(a) { a.cancel(); });
  panel.classList.remove('is-open');
  rebuildList();
  stateLabel.textContent = 'AT REST';
});
</script>
</body>
</html>
