<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Updates Pill Component</title>
<style>
  @font-face { font-family: 'EndowSans'; font-weight: 400; src: url('../fonts/endowsans-400.woff2') format('woff2'); }
  @font-face { font-family: 'EndowSans'; font-weight: 700; src: url('../fonts/endowsans-700.woff2') format('woff2'); }

  * { margin: 0; padding: 0; box-sizing: border-box; }
  body {
    background: #1a1a1a;
    display: flex;
    flex-direction: column;
    min-height: 100vh;
    font-family: 'EndowSans', system-ui, sans-serif;
  }

  .page-top {
    flex: 0 0 auto;
    display: flex;
    align-items: center;
    justify-content: center;
    border-bottom: 1px solid rgba(255,255,255,0.06);
    padding: 20px 0;
  }

  .page-bottom {
    flex: 1;
    display: flex;
    flex-direction: column;
    align-items: center;
    justify-content: center;
    position: relative;
  }

  .grid {
    display: grid;
    grid-template-columns: 1fr 1fr 1fr;
    gap: 24px;
    padding: 30px 40px;
  }

  /* Carousel */
  .carousel {
    display: flex;
    align-items: center;
    gap: 40px;
  }

  .carousel__nav {
    width: 36px;
    height: 36px;
    border-radius: 50%;
    border: 1px solid rgba(255,255,255,0.1);
    background: none;
    color: rgba(255,255,255,0.4);
    font-size: 16px;
    cursor: pointer;
    display: flex;
    align-items: center;
    justify-content: center;
    transition: border-color 0.15s, color 0.15s;
    flex-shrink: 0;
  }

  .carousel__nav:hover {
    border-color: rgba(255,255,255,0.2);
    color: rgba(255,255,255,0.7);
  }

  .carousel__nav:active {
    transform: scale(0.92);
  }

  .carousel__nav:disabled {
    opacity: 0.2;
    pointer-events: none;
  }

  .carousel__stage {
    width: 320px;
    height: 60px;
    display: flex;
    align-items: center;
    justify-content: center;
    position: relative;
  }

  .carousel__dots {
    display: flex;
    gap: 8px;
    margin-top: 24px;
  }

  .carousel__dot {
    width: 6px;
    height: 6px;
    border-radius: 50%;
    background: rgba(255,255,255,0.15);
    transition: background 0.2s;
  }

  .carousel__dot.is-current {
    background: #D97757;
  }

  .carousel__triggers {
    display: flex;
    gap: 12px;
    margin-top: 24px;
  }

  .carousel__trigger {
    background: none;
    border: 1px solid rgba(255,255,255,0.1);
    color: rgba(255,255,255,0.4);
    font-family: 'EndowSans', system-ui, sans-serif;
    font-size: 11px;
    font-weight: 500;
    padding: 6px 16px;
    border-radius: 8px;
    cursor: pointer;
    transition: border-color 0.15s, color 0.15s;
  }

  .carousel__trigger:hover {
    border-color: rgba(255,255,255,0.2);
    color: rgba(255,255,255,0.7);
  }

  .carousel__trigger:active {
    transform: scale(0.96);
  }

  .carousel__slide-label {
    font-size: 10px;
    font-weight: 500;
    letter-spacing: 0.06em;
    text-transform: uppercase;
    color: rgba(255,255,255,0.2);
    margin-top: 16px;
  }

  /* Carousel pill transitions */
  .carousel .pill {
    position: absolute;
    overflow: visible;
    transition: padding 0.35s cubic-bezier(0.4, 0, 0.2, 1), gap 0.35s cubic-bezier(0.4, 0, 0.2, 1);
  }

  .carousel .pill__label {
    position: relative;
    overflow: hidden;
  }

  .carousel .pill__label-text {
    display: inline-block;
    transition: opacity 0.25s ease, transform 0.25s ease;
  }

  .carousel .pill__label-text.is-exiting {
    opacity: 0;
    transform: translateY(-6px);
    position: absolute;
  }

  .carousel .pill__label-text.is-entering {
    opacity: 0;
    transform: translateY(6px);
  }

  .carousel .pill__label-text.is-visible {
    opacity: 1;
    transform: translateY(0);
  }

  .grid-item {
    display: flex;
    flex-direction: column;
    align-items: center;
    gap: 10px;
  }

  .grid-label {
    font-size: 10px;
    font-weight: 500;
    letter-spacing: 0.06em;
    text-transform: uppercase;
    color: rgba(255,255,255,0.25);
  }

  .pill {
    display: flex;
    align-items: center;
    gap: 10px;
    height: 44px;
    background: #1a1a1a;
    border: 1px solid rgba(255,255,255,0.1);
    border-radius: 22px;
    padding: 6px 18px 6px 6px;
    user-select: none;
    box-shadow: 0 2px 12px rgba(0,0,0,0.4);
  }

  .pill--interactive {
    cursor: pointer;
  }

  .pill__icon {
    width: 32px;
    height: 32px;
    border-radius: 50%;
    background: rgba(255,255,255,0.08);
    display: flex;
    align-items: center;
    justify-content: center;
    overflow: hidden;
    flex-shrink: 0;
    color: #D97757;
    transition: background 0.15s, transform 0.1s;
  }

  .pill--interactive:hover .pill__icon {
    background: rgba(217,119,87,0.12);
  }

  .pill--interactive:active .pill__icon {
    transform: scale(0.92);
  }

  .pill--interactive.is-active .pill__icon {
    background: #D97757;
    color: #fff;
  }

  .pill--interactive.is-active:hover .pill__icon {
    background: #D97757;
  }

  .pill__spark {
    width: 18px;
    height: 18px;
    overflow: hidden;
  }

  .pill__spark svg {
    width: 100%;
    fill: currentColor;
  }

  .pill__label {
    font-family: 'EndowSans', system-ui, sans-serif;
    font-size: 14px;
    font-weight: 500;
    color: rgba(255,255,255,0.85);
    letter-spacing: -0.01em;
    white-space: nowrap;
  }

  .pill--interactive:hover .pill__label {
    color: rgba(255,255,255,0.95);
  }

  .pill--glow {
    animation: glow-pulse 3s ease-in-out infinite;
  }

  @keyframes glow-pulse {
    0%, 100% {
      border-color: rgba(255,255,255,0.1);
      box-shadow: 0 2px 12px rgba(0,0,0,0.4);
    }
    50% {
      border-color: rgba(217,119,87,0.25);
      box-shadow: 0 2px 12px rgba(0,0,0,0.4), 0 0 12px rgba(217,119,87,0.06);
    }
  }

  .pill--glow.is-active {
    animation: none;
    border-color: rgba(255,255,255,0.1);
    box-shadow: 0 2px 12px rgba(0,0,0,0.4);
  }

  .pill--icon-only {
    padding: 6px;
    position: relative;
    overflow: visible;
  }

  .pill__hint {
    position: absolute;
    bottom: 100%;
    left: 50%;
    transform: translateX(-50%) translateY(4px);
    background: #1a1a1a;
    border: 1px solid rgba(255,255,255,0.1);
    border-radius: 20px;
    padding: 5px 14px;
    font-size: 11px;
    font-family: 'EndowSans', system-ui, sans-serif;
    font-weight: 500;
    color: rgba(255,255,255,0.85);
    white-space: nowrap;
    pointer-events: none;
    opacity: 0;
    transition: opacity 120ms ease, transform 120ms ease;
    box-shadow: 0 2px 8px rgba(0,0,0,0.3);
    z-index: 1;
    margin-bottom: 6px;
  }

  .pill--icon-only:hover .pill__hint {
    opacity: 1;
    transform: translateX(-50%) translateY(0);
  }

  .pill__redo {
    width: 18px;
    height: 18px;
    display: flex;
    align-items: center;
    justify-content: center;
  }

  .pill__redo svg {
    width: 100%;
    height: 100%;
    stroke: #D97757;
  }

  .dots {
    display: inline-block;
    width: 1.2em;
    text-align: left;
    vertical-align: baseline;
  }

  .dots::after {
    content: '';
    animation: ellipsis 1.5s steps(4) infinite;
  }

  @keyframes ellipsis {
    0%  { content: ''; }
    25% { content: '.'; }
    50% { content: '..'; }
    75% { content: '...'; }
  }
</style>
</head>
<body>

<div class="page-top">
<div class="grid">
  <div class="grid-item">
    <div class="pill" data-sprite="writing" data-text="Sending to Claude...">
      <div class="pill__icon"><div class="pill__spark"></div></div>
      <span class="pill__label">Sending to Claude<span class="dots"></span></span>
    </div>
    <span class="grid-label">Sending</span>
  </div>

  <div class="grid-item">
    <div class="pill" data-sprite="shimmer" data-text="Working...">
      <div class="pill__icon"><div class="pill__spark"></div></div>
      <span class="pill__label">Working<span class="dots"></span></span>
    </div>
    <span class="grid-label">Working</span>
  </div>

  <div class="grid-item">
    <div class="pill" data-sprite="orbiting" data-text="Retrying...">
      <div class="pill__icon"><div class="pill__spark"></div></div>
      <span class="pill__label">Retrying<span class="dots"></span></span>
    </div>
    <span class="grid-label">Retrying</span>
  </div>

  <div class="grid-item">
    <div class="pill pill--interactive pill--glow" id="retry-pill">
      <div class="pill__icon"><div class="pill__redo"></div></div>
      <span class="pill__label">Retry Send</span>
    </div>
    <span class="grid-label">Clickable (redo)</span>
  </div>

  <div class="grid-item">
    <div class="pill pill--interactive pill--glow" id="update-pill" data-sprite="waiting" data-text="Update Available">
      <div class="pill__icon"><div class="pill__spark"></div></div>
      <span class="pill__label">Update Available</span>
    </div>
    <span class="grid-label">Clickable</span>
  </div>

  <div class="grid-item">
    <div class="pill pill--interactive pill--icon-only" id="review-pill" data-static="true">
      <div class="pill__icon"><div class="pill__spark"></div></div>
      <div class="pill__hint">Review Changes</div>
    </div>
    <span class="grid-label">Clickable (static)</span>
  </div>
</div>
</div>

<div class="page-bottom">
  <div class="carousel">
    <button class="carousel__nav" id="nav-prev" disabled>&larr;</button>
    <div class="carousel__stage" id="stage"></div>
    <button class="carousel__nav" id="nav-next">&rarr;</button>
  </div>
  <div class="carousel__dots" id="dots"></div>
  <div class="carousel__slide-label" id="slide-label"></div>
  <div class="carousel__triggers">
    <button class="carousel__trigger" id="send-again">Send New Changes</button>
    <button class="carousel__trigger" id="dismiss-all">Dismiss All Changes</button>
  </div>
</div>

<script>
var staticSvg = '<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 100 100"><path d="m19.6 66.5 19.7-11 .3-1-.3-.5h-1l-3.3-.2-11.2-.3L14 53l-9.5-.5-2.4-.5L0 49l.2-1.5 2-1.3 2.9.2 6.3.5 9.5.6 6.9.4L38 49.1h1.6l.2-.7-.5-.4-.4-.4L29 41l-10.6-7-5.6-4.1-3-2-1.5-2-.6-4.2 2.7-3 3.7.3.9.2 3.7 2.9 8 6.1L37 36l1.5 1.2.6-.4.1-.3-.7-1.1L33 25l-6-10.4-2.7-4.3-.7-2.6c-.3-1-.4-2-.4-3l3-4.2L28 0l4.2.6L33.8 2l2.6 6 4.1 9.3L47 29.9l2 3.8 1 3.4.3 1h.7v-.5l.5-7.2 1-8.7 1-11.2.3-3.2 1.6-3.8 3-2L61 2.6l2 2.9-.3 1.8-1.1 7.7L59 27.1l-1.5 8.2h.9l1-1.1 4.1-5.4 6.9-8.6 3-3.5L77 13l2.3-1.8h4.3l3.1 4.7-1.4 4.9-4.4 5.6-3.7 4.7-5.3 7.1-3.2 5.7.3.4h.7l12-2.6 6.4-1.1 7.6-1.3 3.5 1.6.4 1.6-1.4 3.4-8.2 2-9.6 2-14.3 3.3-.2.1.2.3 6.4.6 2.8.2h6.8l12.6 1 3.3 2 1.9 2.7-.3 2-5.1 2.6-6.8-1.6-16-3.8-5.4-1.3h-.8v.4l4.6 4.5 8.3 7.5L89 80.1l.5 2.4-1.3 2-1.4-.2-9.2-7-3.6-3-8-6.8h-.5v.7l1.8 2.7 9.8 14.7.5 4.5-.7 1.4-2.6 1-2.7-.6-5.8-8-6-9-4.7-8.2-.5.4-2.9 30.2-1.3 1.5-3 1.2-2.5-2-1.4-3 1.4-6.2 1.6-8 1.3-6.4 1.2-7.9.7-2.6v-.2H49L43 72l-9 12.3-7.2 7.6-1.7.7-3-1.5.3-2.8L24 86l10-12.8 6-7.9 4-4.6-.1-.5h-.3L17.2 77.4l-4.7.6-2-2 .2-3 1-1 8-5.5Z"/></svg>';

var waitingFrameIndices = [2, 4, 7, 8, 11, 14, 15];
var spriteConfigs = {
  thinking: { frameCount: 9, speed: 90 },
  writing: { frameCount: 8, speed: 90 },
  waiting: { frameCount: 16, speed: 600 },
  orbiting: { frameCount: 18, speed: 100 },
  shimmer: { frameCount: 15, speed: 100 }
};
var spriteSvgs = {};

function setSpark(container, svgText, fill) {
  container.textContent = '';
  container.insertAdjacentHTML('beforeend', svgText);
  container.querySelector('svg').setAttribute('fill', fill);
}

function animateSpark(container, spriteName) {
  var svgText = spriteSvgs[spriteName];
  var cfg = spriteConfigs[spriteName];
  setSpark(container, svgText, '#D97757');
  var svg = container.querySelector('svg');

  var frames, dur;
  if (spriteName === 'waiting') {
    frames = waitingFrameIndices.map(function(i) {
      return { transform: 'translateY(-' + (i * (100 / cfg.frameCount)) + '%)' };
    });
    dur = 80 * frames.length;
  } else {
    frames = Array.from({length: cfg.frameCount}, function(_, i) {
      return { transform: 'translateY(-' + (i * (100 / cfg.frameCount)) + '%)' };
    });
    dur = cfg.speed * frames.length;
  }

  return svg.animate(frames, {
    duration: dur,
    iterations: Infinity,
    easing: 'steps(' + frames.length + ', jump-none)'
  });
}

Promise.all([
  fetch('spark-thinking.svg').then(function(r) { return r.text(); }),
  fetch('spark-writing.svg').then(function(r) { return r.text(); }),
  fetch('spark-waiting.svg').then(function(r) { return r.text(); }),
  fetch('spark-orbiting.svg').then(function(r) { return r.text(); }),
  fetch('spark-shimmer.svg').then(function(r) { return r.text(); })
]).then(function(results) {
  spriteSvgs.thinking = results[0];
  spriteSvgs.writing = results[1];
  spriteSvgs.waiting = results[2];
  spriteSvgs.orbiting = results[3];
  spriteSvgs.shimmer = results[4];

  // Animate each non-interactive pill
  document.querySelectorAll('.pill:not(.pill--interactive)').forEach(function(pill) {
    var spark = pill.querySelector('.pill__spark');
    var sprite = pill.dataset.sprite;
    animateSpark(spark, sprite);
  });

  // Interactive pill (#4): waiting at rest, writing on hover, static white on active
  var updatePill = document.getElementById('update-pill');
  var updateSpark = updatePill.querySelector('.pill__spark');
  var isActive = false;
  var currentAnim = animateSpark(updateSpark, 'waiting');

  updatePill.addEventListener('mouseenter', function() {
    if (isActive) return;
    if (currentAnim) currentAnim.cancel();
    currentAnim = animateSpark(updateSpark, 'writing');
  });

  updatePill.addEventListener('mouseleave', function() {
    if (isActive) return;
    if (currentAnim) currentAnim.cancel();
    currentAnim = animateSpark(updateSpark, 'waiting');
  });

  updatePill.addEventListener('click', function() {
    isActive = !isActive;
    updatePill.classList.toggle('is-active', isActive);
    if (isActive) {
      if (currentAnim) { currentAnim.cancel(); currentAnim = null; }
      setSpark(updateSpark, staticSvg, '#fff');
    } else {
      currentAnim = animateSpark(updateSpark, 'waiting');
    }
  });

  // Retry Send pill: redo icon from Lucide Animated (verbatim paths)
  var retryPill = document.getElementById('retry-pill');
  var redoContainer = retryPill.querySelector('.pill__redo');
  var redoSvgNS = 'http://www.w3.org/2000/svg';

  var redoSvg = document.createElementNS(redoSvgNS, 'svg');
  redoSvg.setAttribute('viewBox', '0 0 24 24');
  redoSvg.setAttribute('fill', 'none');
  redoSvg.setAttribute('stroke', 'currentColor');
  redoSvg.setAttribute('stroke-width', '2');
  redoSvg.setAttribute('stroke-linecap', 'round');
  redoSvg.setAttribute('stroke-linejoin', 'round');

  var redoArrow = document.createElementNS(redoSvgNS, 'path');
  redoArrow.setAttribute('d', 'M21 7v6h-6');
  redoArrow.style.transformBox = 'fill-box';
  redoArrow.style.transformOrigin = 'center';
  redoSvg.appendChild(redoArrow);

  var redoArc = document.createElementNS(redoSvgNS, 'path');
  redoArc.setAttribute('d', 'M3 17a9 9 0 0 1 9-9 9 9 0 0 1 6 2.3l3 2.7');
  redoArc.setAttribute('pathLength', '1');
  redoArc.setAttribute('stroke-dasharray', '1');
  redoArc.setAttribute('stroke-dashoffset', '0');
  redoSvg.appendChild(redoArc);

  redoContainer.appendChild(redoSvg);

  var redoEasing = 'cubic-bezier(0.25, 0.1, 0.25, 1)';

  retryPill.addEventListener('mouseenter', function() {
    redoArrow.animate([
      { transform: 'translateX(0px) translateY(0px) rotate(0deg)' },
      { transform: 'translateX(-2.1px) translateY(-1.4px) rotate(-12deg)' },
      { transform: 'translateX(0px) translateY(0px) rotate(0deg)' }
    ], { duration: 600, easing: redoEasing });

    redoArc.animate([
      { strokeDashoffset: '0' },
      { strokeDashoffset: '0.2' },
      { strokeDashoffset: '0' }
    ], { duration: 600, easing: redoEasing });
  });

  // Review pill: static icon at rest, click toggles active
  var reviewPill = document.getElementById('review-pill');
  var reviewSpark = reviewPill.querySelector('.pill__spark');
  var reviewActive = false;
  setSpark(reviewSpark, staticSvg, '#D97757');

  reviewPill.addEventListener('click', function() {
    reviewActive = !reviewActive;
    reviewPill.classList.toggle('is-active', reviewActive);
    setSpark(reviewSpark, staticSvg, reviewActive ? '#fff' : '#D97757');
  });

  // === CAROUSEL ===
  var stage = document.getElementById('stage');
  var prevBtn = document.getElementById('nav-prev');
  var nextBtn = document.getElementById('nav-next');
  var dotsEl = document.getElementById('dots');
  var slideLabel = document.getElementById('slide-label');
  var currentSlide = 0;
  var updateUsed = false;
  var carouselPill = null;
  var carouselSpark = null;
  var carouselLabel = null;
  var carouselAnim = null;
  var carouselRedoArrow = null;
  var carouselRedoArc = null;

  var slides = [
    { name: 'Empty', sprite: null, text: null, clickable: false },
    { name: 'Sending', sprite: 'writing', text: 'Sending to Claude', dots: true, clickable: false },
    { name: 'Working', sprite: 'shimmer', text: 'Working', dots: true, clickable: false },
    { name: 'Retry Send', sprite: 'redo', text: 'Retry Send', dots: false, clickable: true, glow: true },
    { name: 'Retrying', sprite: 'orbiting', text: 'Retrying', dots: true, clickable: false },
    { name: 'Review Changes', sprite: 'waiting', text: 'Review Changes', dots: false, clickable: true, glow: true, oneTime: true }
  ];

  // Build dots
  for (var d = 0; d < slides.length; d++) {
    var dot = document.createElement('div');
    dot.className = 'carousel__dot' + (d === 0 ? ' is-current' : '');
    dotsEl.appendChild(dot);
  }

  function updateDots() {
    var dots = dotsEl.children;
    for (var i = 0; i < dots.length; i++) {
      dots[i].className = 'carousel__dot' + (i === currentSlide ? ' is-current' : '');
    }
  }

  function updateNav() {
    prevBtn.disabled = currentSlide === 0;
    nextBtn.disabled = currentSlide === slides.length - 1;
  }

  function clearStage() {
    if (carouselAnim) { carouselAnim.cancel(); carouselAnim = null; }
    carouselRedoArrow = null;
    carouselRedoArc = null;
    stage.textContent = '';
    carouselPill = null;
    carouselSpark = null;
    carouselLabel = null;
  }

  function buildRedoIcon(container) {
    var ns = 'http://www.w3.org/2000/svg';
    var svg = document.createElementNS(ns, 'svg');
    svg.setAttribute('viewBox', '0 0 24 24');
    svg.setAttribute('fill', 'none');
    svg.setAttribute('stroke', 'currentColor');
    svg.setAttribute('stroke-width', '2');
    svg.setAttribute('stroke-linecap', 'round');
    svg.setAttribute('stroke-linejoin', 'round');
    var arrow = document.createElementNS(ns, 'path');
    arrow.setAttribute('d', 'M21 7v6h-6');
    arrow.style.transformBox = 'fill-box';
    arrow.style.transformOrigin = 'center';
    svg.appendChild(arrow);
    var arc = document.createElementNS(ns, 'path');
    arc.setAttribute('d', 'M3 17a9 9 0 0 1 9-9 9 9 0 0 1 6 2.3l3 2.7');
    arc.setAttribute('pathLength', '1');
    arc.setAttribute('stroke-dasharray', '1');
    arc.setAttribute('stroke-dashoffset', '0');
    svg.appendChild(arc);
    container.appendChild(svg);
    carouselRedoArrow = arrow;
    carouselRedoArc = arc;
  }

  function buildPill(slide) {
    var pill = document.createElement('div');
    pill.className = 'pill' + (slide.clickable ? ' pill--interactive' : '') + (slide.glow ? ' pill--glow' : '');
    pill.style.opacity = '0';

    var icon = document.createElement('div');
    icon.className = 'pill__icon';

    if (slide.sprite === 'redo') {
      var redoWrap = document.createElement('div');
      redoWrap.className = 'pill__redo';
      buildRedoIcon(redoWrap);
      icon.appendChild(redoWrap);
    } else {
      var spark = document.createElement('div');
      spark.className = 'pill__spark';
      icon.appendChild(spark);
      carouselSpark = spark;
    }

    pill.appendChild(icon);

    if (slide.text) {
      var label = document.createElement('span');
      label.className = 'pill__label';
      var textSpan = document.createElement('span');
      textSpan.className = 'pill__label-text is-visible';
      textSpan.textContent = slide.text;
      label.appendChild(textSpan);
      if (slide.dots) {
        var dotsSpan = document.createElement('span');
        dotsSpan.className = 'dots';
        label.appendChild(dotsSpan);
      }
      pill.appendChild(label);
      carouselLabel = label;
    }

    stage.appendChild(pill);
    carouselPill = pill;
    return pill;
  }

  function enterPill(slide) {
    var pill = buildPill(slide);

    // Start icon animation
    if (slide.sprite && slide.sprite !== 'redo' && carouselSpark) {
      carouselAnim = animateSpark(carouselSpark, slide.sprite);
    }

    // Start with label hidden, icon-only padding
    if (carouselLabel) {
      carouselLabel.style.width = '0';
      carouselLabel.style.opacity = '0';
      carouselLabel.style.overflow = 'hidden';
      carouselLabel.style.whiteSpace = 'nowrap';
      carouselLabel.style.transition = 'width 0.45s cubic-bezier(0.4, 0, 0.2, 1), opacity 0.35s ease 0.1s';
    }
    pill.style.padding = '6px';

    // Slide-fade in from left (icon-only)
    pill.animate([
      { opacity: 0, transform: 'translateX(-20px)' },
      { opacity: 1, transform: 'translateX(0)' }
    ], { duration: 350, easing: 'cubic-bezier(0.4, 0, 0.2, 1)', fill: 'forwards' });

    // After icon lands, grow width and fade in label
    setTimeout(function() {
      if (carouselLabel) {
        pill.style.padding = '6px 18px 6px 6px';
        carouselLabel.style.width = carouselLabel.scrollWidth + 'px';
        carouselLabel.style.opacity = '1';
      }
    }, 200);

    // Wire up clickable hover/click
    if (slide.clickable && slide.sprite === 'redo') {
      pill.addEventListener('mouseenter', function() {
        if (carouselRedoArrow) {
          carouselRedoArrow.animate([
            { transform: 'translateX(0px) translateY(0px) rotate(0deg)' },
            { transform: 'translateX(-2.1px) translateY(-1.4px) rotate(-12deg)' },
            { transform: 'translateX(0px) translateY(0px) rotate(0deg)' }
          ], { duration: 600, easing: 'cubic-bezier(0.25, 0.1, 0.25, 1)' });
        }
        if (carouselRedoArc) {
          carouselRedoArc.animate([
            { strokeDashoffset: '0' },
            { strokeDashoffset: '0.2' },
            { strokeDashoffset: '0' }
          ], { duration: 600, easing: 'cubic-bezier(0.25, 0.1, 0.25, 1)' });
        }
      });
    }

    if (slide.oneTime) {
      pill.addEventListener('mouseenter', function() {
        if (updateUsed || !carouselSpark) return;
        if (carouselAnim) carouselAnim.cancel();
        carouselAnim = animateSpark(carouselSpark, 'thinking');
      });
      pill.addEventListener('mouseleave', function() {
        if (updateUsed || !carouselSpark) return;
        if (carouselAnim) carouselAnim.cancel();
        carouselAnim = animateSpark(carouselSpark, 'waiting');
      });
      pill.addEventListener('click', function() {
        if (!updateUsed) {
          // First click: collapse to icon-only Review Changes
          updateUsed = true;
          pill.classList.add('is-active', 'pill--icon-only');
          pill.classList.remove('pill--glow');
          pill.style.gap = '0';
          pill.style.padding = '6px';
          if (carouselAnim) { carouselAnim.cancel(); carouselAnim = null; }
          setSpark(carouselSpark, staticSvg, '#fff');
          slideLabel.textContent = 'Review Changes';
          pill.onmouseenter = null;
          pill.onmouseleave = null;

          if (carouselLabel) {
            carouselLabel.style.transition = 'width 0.35s cubic-bezier(0.4, 0, 0.2, 1), opacity 0.25s ease';
            carouselLabel.style.width = '0';
            carouselLabel.style.opacity = '0';
          }

          if (!pill.querySelector('.pill__hint')) {
            var hint = document.createElement('div');
            hint.className = 'pill__hint';
            hint.textContent = 'Review Changes';
            pill.appendChild(hint);
          }
        } else {
          // Toggle active state on/off (stays icon-only)
          var isOn = pill.classList.toggle('is-active');
          setSpark(carouselSpark, staticSvg, isOn ? '#fff' : '#D97757');
        }
      });
    }
  }

  function crossfadeTo(slide) {
    if (!carouselPill) { enterPill(slide); return; }

    // Snap sprite
    if (carouselAnim) { carouselAnim.cancel(); carouselAnim = null; }

    if (slide.sprite === 'redo') {
      // Swap icon to redo
      var iconEl = carouselPill.querySelector('.pill__icon');
      iconEl.textContent = '';
      var redoWrap = document.createElement('div');
      redoWrap.className = 'pill__redo';
      buildRedoIcon(redoWrap);
      iconEl.appendChild(redoWrap);
      carouselSpark = null;

      // Wire hover
      carouselPill.classList.add('pill--interactive', 'pill--glow');
      carouselPill.onmouseenter = function() {
        if (carouselRedoArrow) {
          carouselRedoArrow.animate([
            { transform: 'translateX(0px) translateY(0px) rotate(0deg)' },
            { transform: 'translateX(-2.1px) translateY(-1.4px) rotate(-12deg)' },
            { transform: 'translateX(0px) translateY(0px) rotate(0deg)' }
          ], { duration: 600, easing: 'cubic-bezier(0.25, 0.1, 0.25, 1)' });
        }
        if (carouselRedoArc) {
          carouselRedoArc.animate([
            { strokeDashoffset: '0' },
            { strokeDashoffset: '0.2' },
            { strokeDashoffset: '0' }
          ], { duration: 600, easing: 'cubic-bezier(0.25, 0.1, 0.25, 1)' });
        }
      };
    } else if (slide.sprite && carouselSpark) {
      carouselAnim = animateSpark(carouselSpark, slide.sprite);
    } else if (slide.sprite && !carouselSpark) {
      // Swap redo back to spark
      var iconEl2 = carouselPill.querySelector('.pill__icon');
      iconEl2.textContent = '';
      var spark2 = document.createElement('div');
      spark2.className = 'pill__spark';
      iconEl2.appendChild(spark2);
      carouselSpark = spark2;
      carouselRedoArrow = null;
      carouselRedoArc = null;
      carouselPill.onmouseenter = null;
      carouselAnim = animateSpark(carouselSpark, slide.sprite);
    }

    // Update classes
    carouselPill.className = 'pill' + (slide.clickable ? ' pill--interactive' : '') + (slide.glow ? ' pill--glow' : '');

    // Crossfade text with width transition
    if (carouselLabel) {
      carouselLabel.style.transition = 'width 0.4s cubic-bezier(0.4, 0, 0.2, 1)';
      carouselLabel.style.overflow = 'hidden';
      carouselLabel.style.whiteSpace = 'nowrap';
      carouselLabel.style.opacity = '1';

      var oldText = carouselLabel.querySelector('.pill__label-text');
      if (oldText) {
        oldText.classList.remove('is-visible');
        oldText.classList.add('is-exiting');
      }
      var oldDots = carouselLabel.querySelector('.dots');
      if (oldDots) oldDots.remove();

      var newText = document.createElement('span');
      newText.className = 'pill__label-text is-entering';
      newText.textContent = slide.text;
      carouselLabel.appendChild(newText);

      if (slide.dots) {
        var newDots = document.createElement('span');
        newDots.className = 'dots';
        carouselLabel.appendChild(newDots);
      }

      // Measure new width, then animate
      requestAnimationFrame(function() {
        var newWidth = newText.offsetWidth + (slide.dots ? 18 : 0);
        carouselLabel.style.width = newWidth + 'px';
        carouselPill.style.padding = '6px 18px 6px 6px';

        requestAnimationFrame(function() {
          newText.classList.remove('is-entering');
          newText.classList.add('is-visible');
          setTimeout(function() { if (oldText) oldText.remove(); }, 300);
        });
      });
    }

    // Wire one-time update click
    if (slide.oneTime && !updateUsed) {
      carouselPill.onmouseenter = function() {
        if (updateUsed || !carouselSpark) return;
        if (carouselAnim) carouselAnim.cancel();
        carouselAnim = animateSpark(carouselSpark, 'thinking');
      };
      carouselPill.onmouseleave = function() {
        if (updateUsed || !carouselSpark) return;
        if (carouselAnim) carouselAnim.cancel();
        carouselAnim = animateSpark(carouselSpark, 'waiting');
      };
      carouselPill.onclick = function() {
        if (!updateUsed) {
          updateUsed = true;
          carouselPill.classList.add('is-active', 'pill--icon-only');
          carouselPill.classList.remove('pill--glow');
          carouselPill.style.gap = '0';
          carouselPill.style.padding = '6px';
          if (carouselAnim) { carouselAnim.cancel(); carouselAnim = null; }
          setSpark(carouselSpark, staticSvg, '#fff');
          slideLabel.textContent = 'Review Changes';
          carouselPill.onmouseenter = null;
          carouselPill.onmouseleave = null;

          if (carouselLabel) {
            carouselLabel.style.transition = 'width 0.35s cubic-bezier(0.4, 0, 0.2, 1), opacity 0.25s ease';
            carouselLabel.style.width = '0';
            carouselLabel.style.opacity = '0';
          }

          if (!carouselPill.querySelector('.pill__hint')) {
            var hint = document.createElement('div');
            hint.className = 'pill__hint';
            hint.textContent = 'Review Changes';
            carouselPill.appendChild(hint);
          }
        } else {
          var isOn = carouselPill.classList.toggle('is-active');
          setSpark(carouselSpark, staticSvg, isOn ? '#fff' : '#D97757');
        }
      };
    }
  }

  function goToSlide(index) {
    if (index < 0 || index >= slides.length) return;
    var prevSlide = currentSlide;
    currentSlide = index;
    updateDots();
    updateNav();

    var slide = slides[index];
    slideLabel.textContent = slide.name;

    if (index === 0) {
      // Empty slide - fade out if pill exists
      if (carouselPill) {
        carouselPill.animate([
          { opacity: 1 }, { opacity: 0 }
        ], { duration: 250, easing: 'ease', fill: 'forwards' });
        setTimeout(clearStage, 260);
      }
      return;
    }

    if (prevSlide === 0 || !carouselPill) {
      clearStage();
      enterPill(slide);
    } else {
      crossfadeTo(slide);
    }
  }

  prevBtn.addEventListener('click', function() { goToSlide(currentSlide - 1); });
  nextBtn.addEventListener('click', function() { goToSlide(currentSlide + 1); });

  document.getElementById('send-again').addEventListener('click', function() {
    updateUsed = false;
    clearStage();
    goToSlide(1);
  });

  document.getElementById('dismiss-all').addEventListener('click', function() {
    updateUsed = false;
    if (carouselPill) {
      carouselPill.animate([
        { opacity: 1, transform: 'scale(1)' },
        { opacity: 0, transform: 'scale(0.9)' }
      ], { duration: 250, easing: 'ease', fill: 'forwards' });
      setTimeout(function() {
        clearStage();
        goToSlide(0);
      }, 260);
    } else {
      goToSlide(0);
    }
  });

  // Init
  goToSlide(0);
  updateNav();
});
</script>
</body>
</html>
